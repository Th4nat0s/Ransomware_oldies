  data: "\n# XEFI / Neocyber\nRepresentatives of XEFI If you are interested in discussing\
    \ the situation with\nFlorent Courtet and the company https://neocyber.fr/ and\
    \ stop the attacks on\nthe companies you hosted, otherwise we will publish all\
    \ the details of this\nsituation, which will lead to a strong blow to the reputation\
    \ of XEFI and\nSASHA ROSENTHAL.\nContact me within 4 days, otherwise after 4 days\
    \ we will make the data public\nTop french newspapers contact me for an exclusive\
    \ interview about the XEFI and\nNeo cyber situation. Interested in cooperation\
    \ only with Big agencies\nThe situation associated with Floren Courtet, also known\
    \ as neocyber.fr. This\nperson all the time played a double game only for his\
    \ own benefit, spitting on\nthe norms and his obligations to the companies that\
    \ he provided cyber defense\nservices to. Our communication with him began in\
    \ the summer of 2021 and\ncontinued until November, when this person deceived\
    \ not only the companies\nthat he entrusted him with data protection but also\
    \ me. We are talking about\nthe XEFI company and its many clients. Floren himself\
    \ claims that he has no\nidea what he is talking about. But Neocyber and I discussed\
    \ the possibility of\nan attack on this company for several months. He was not\
    \ only aware of the\npreparations for a potential attack, but also participated\
    \ in this\npreparations. Offering his available data about this company. Neocyber\
    \ also\nasked me for various other accesses as a sign of cooperation, after which\
    \ he\nsimply begged for them, some of the last transferred accesses were associated\n\
    with medical and educational institutions. For personal reasons, I did not\nplan\
    \ to carry out any attacks by myself and cause harm to these companies.\nTherefore,\
    \ they were transferred to Floren. Moreover, there are mentions of a\nPrecredit\
    \ company on his part.\nClaiming that the company that turned to him for help\
    \ are \u201CIDIOTS\u201D and it will\nnot be so difficult to hack them with his\
    \ personal help. This quote is taken\nfrom our chat. He also constantly asked\
    \ to delete our correspondence, where we\ndiscuss the XEFI data for the upcoming\
    \ attack. Luckily, I didn\u2019t, because in\nthe end, this person deceived everyone,\
    \ believing that there is no any\nevidences against his \u201Cpure reputation\u201D\
    . All the important points about the\ntransfer, explanation of access, company\
    \ passwords, SSH, vulnerabilities and\nother things are saved in my pocket. This\
    \ would never have happened if\nNeocyber had kept his word,but since November\
    \ he started just ignore me. This\nman is a liar and a scammer and his whole reputation\
    \ and his company is\nnothing more than a soap bubble built on similar deceptions\
    \ of companies that\nask him for services.\nHe valued his company\u2019s many\
    \ years of work and reputation in this situation at\na miserable $ 40,000 and\
    \ a couple of accesses that he stole from me in the\nend, some of which were not\
    \ even developed by me yet.\nMost of what happened is indicated here, but not\
    \ yet complete and without the\nmost interesting details that confirm everything\
