  data: "\n# IDFC FIRST Bank\n  * Post author By admin\n  * Post date December 24,\
    \ 2020\nWe\u2019re going to demonstrate the way large Indian bank IDFC FIRST Bank\
    \ stores\npersonal data of clients.  \nFor data processing, the bank uses a contractor\
    \ https://www.salesforce.com.\nLet\u2019s consider what information is available\
    \ to an ordinary employee of the\ncredit department.  \nPlease note that all information\
    \ is stored unencrypted and is available for\nreviewing by an employee or any\
    \ other person at any time.  \nAn account login information is not additionally\
    \ protected by two-factor\nauthentication, as well as personal data are not protected\
    \ by additional\npasswords.  \nAll personal information such as passports, drivers\
    \ licenses, bank statements,\nloan agreements and much more can be downloaded\
    \ and used at any time without\nthe clients knowledge and against their interests.\
    \  \nOld applications and cancelled on client request applications are not deleted\n\
    along with personal data of repaid credits.  \nIDFC FIRST Bank used to collect\
    \ and store all information with any limitation\nperiod.  \nIn this example, a\
    \ maximum period of retention is 2 years. It\u2019s obvious that\nall credit managers\
    \ work under the same conditions.  \nAt any time numerous partners from all over\
    \ the world may suffer as well.\nYou can download and view the complete credentials\
    \ for each client for several\nyears below, 581 people totally.\nBelow we\u2019\
    ve attached an article from mass media about banks security.\nhttps://ciso.economictimes.indiatimes.com/news/heres-how-idfc-bank-is-\n\
