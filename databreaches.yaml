  data: "\n# Justice Department Announces Court-Authorized Seizure of Domain Names\
    \ Used\nin Furtherance of Spear-Phishing Campaign Posing as U.S. Agency for\n\
    International Development\n  * __June 1, 2021\n  *  __Dissent\n  * \nWASHINGTON\
    \ \u2013 On May 28, pursuant to court orders issued in the Eastern\nDistrict of\
    \ Virginia, the United States seized two command-and-control (C2)\nand malware\
    \ distribution domains used in recent spear-phishing activity that\nmimicked email\
    \ communications from the U.S. Agency for International\nDevelopment (USAID).\
    \ This malicious activity was the subject of a May 27\nMicrosoft security alert,\
    \ titled \u201CNew sophisticated email-based attack from\nNobelium,\u201D and\
    \ a May 28 FBI and Cybersecurity and Infrastructure Security\nAgency joint cybersecurity\
    \ advisory.\nThe Department\u2019s seizure of the two domains was aimed at disrupting\
    \ the\nmalicious actors\u2019 follow-on exploitation of victims, as well as identifying\n\
    compromised victims. However, the actors may have deployed additional backdoor\n\
    accesses between the time of the initial compromises and last week\u2019s seizures.\n\
    \u201CLast week\u2019s action is a continued demonstration of the Department\u2019\
    s\ncommitment to proactively disrupt hacking activity prior to the conclusion\
    \ of\na criminal investigation,\u201D said Assistant Attorney General John C.\
    \ Demers for\nthe Justice Department\u2019s National Security Division. \u201C\
    Law enforcement remains\nan integral part of the U.S. government\u2019s broader\
    \ disruption efforts against\nmalicious cyber-enabled activities, even prior to\
    \ arrest, and we will continue\nto evaluate all possible opportunities to use\
    \ our unique authorities to act\nagainst such threats.\u201D\n\u201CCyber intrusions\
    \ and spear-phishing email attacks can cause widespread damage\nthroughout affected\
    \ computer networks, and can result in significant harm to\nindividual victims,\
    \ government agencies, NGOs, and private businesses,\u201D said\nActing U.S. Attorney\
    \ Raj Parekh for the Eastern District of Virginia. \u201CAs\ndemonstrated by the\
    \ court-authorized seizure of these malicious domains, we\nare committed to using\
    \ all available tools to protect the public and our\ngovernment from these worldwide\
    \ hacking threats.\u201D\n\u201CFriday\u2019s court-authorized domain seizures\
    \ reflect the FBI Washington Field\nOffice\u2019s continued commitment to cyber\
    \ victims in our region,\u201D said Assistant\nDirector in Charge Steven M. D\u2019\
    Antuono of the FBI\u2019s Washington Field Office.\n\u201CThese actions demonstrate\
    \ our ability to quickly respond to malicious cyber\nactivities by leveraging\
    \ our unique authorities to disrupt our cyber\nadversaries.\u201D\n\u201CThe FBI\
    \ remains committed to disrupting this type of malicious cyber activity\ntargeting\
    \ our federal agencies and the American public,\u201D said Assistant\nDirector\
    \ Bryan Vorndran of the FBI\u2019s Cyber Division. \u201CWe will continue to use\n\
    all of the tools in our toolbelt and leverage our domestic and international\n\
    partnerships to not only disrupt this type of hacking activity but to impose\n\
    risk and consequences upon our adversaries to combat these threats.\u201D\nOn\
    \ or about May 25, malicious actors commenced a wide-scale spear-phishing\ncampaign\
    \ leveraging a compromised USAID account at an identified mass email\nmarketing\
    \ company. Specifically, the compromised account was used to send\nspear-phishing\
    \ emails, purporting to be from USAID email accounts and\ncontaining a \u201C\
    special alert,\u201D to thousands of email accounts at over one\nhundred entities.\n\
    Upon a recipient clicking on a spear-phishing email\u2019s hyperlink, the victim\n\
    computer was directed to download malware from a sub-domain of\ntheyardservice[.]com.\
    \ Using that initial foothold, the actors then downloaded\nthe Cobalt Strike tool\
    \ to maintain persistent presence and possibly deploy\nadditional tools or malware\
    \ to the victim\u2019s network. The actors\u2019 instance of\nthe Cobalt Strike\
    \ tool received C2 communications via other subdomains of\ntheyardservice[.]com,\
    \ as well as the domain worldhomeoutlet[.]com. It was\nthose two domains that\
    \ the Department seized pursuant to the court\u2019s seizure\norder.\nThe National\
    \ Security Division\u2019s Counterintelligence and Export Control\nSection and\
    \ the United States Attorney\u2019s Office for the Eastern District of\nVirginia\
    \ are investigating this matter in coordination with the FBI\u2019s Cyber\nDivision\
    \ and Washington Field Office.\nSource: U.S. Department of Justice\n### Related\
    \ Posts:\n  * Russian SolarWinds hackers launch email attack on\u2026\n  * Spear\
    \ Phishing Campaign Targets Ukraine Government\u2026\n  * Justice Department announces\
    \ court-authorized effort\u2026\n  * COVID-19 Exploited by Malicious Cyber Actors\
    \ (Alert\u2026\n  * Former Energy Department worker sentenced in email\u2026\n"
