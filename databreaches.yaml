  data: "\n# AEON Clinical Laboratories (Peachstate) Pays $25,000 to Settle Potential\n\
    HIPAA Security Rule Violations\n  * __May 25, 2021\n  *  __Dissent\n  * \nPeachstate\
    \ Health Management, LLC, doing business as AEON Clinical\nLaboratories (Peachstate),\
    \ has agreed to pay $25,000 to the Office for Civil\nRights (OCR) at the U.S.\
    \ Department of Health and Human Services (HHS) and to\nimplement a corrective\
    \ action plan to settle potential violations of the\nHealth Insurance Portability\
    \ and Accountability Act (HIPAA) Security Rule.\nPeachstate is based in Georgia\
    \ and is certified under the Clinical Laboratory\nImprovement Amendments of 1988\
    \ (CLIA). Peachstate provides diagnostic and\nlaboratory-developed tests, including\
    \ clinical and genetic testing services.\nIn December 2017, OCR initiated a compliance\
    \ review of Peachstate to determine\nits compliance with the HIPAA Privacy and\
    \ Security Rules. OCR\u2019s investigation\nfound systemic noncompliance with\
    \ the HIPAA Security Rule, including failures\nto conduct an enterprise-wide risk\
    \ analysis, implement risk management and\naudit controls, and maintain documentation\
    \ of HIPAA Security Rule policies and\nprocedures.\n\u201CClinical laboratories,\
    \ like other covered health care providers, must comply\nwith the HIPAA Security\
    \ Rule. The failure to implement basic Security Rule\nrequirements makes HIPAA\
    \ regulated entities attractive targets for malicious\nactivity, and needlessly\
    \ risks patients\u2019 electronic health information,\u201D said\nRobinsue Frohboese,\
    \ Acting OCR Director. \u201CThis settlement reiterates OCR\u2019s\ncommitment\
    \ to ensuring compliance with rules that protect the privacy and\nsecurity of\
    \ protected health information.\u201D\nIn addition to the monetary settlement,\
    \ Peachstate has agreed to a robust\ncorrective action plan that includes three\
    \ years of monitoring. The resolution\nagreement and corrective action plan may\
    \ be found at:\nhttps://www.hhs.gov/sites/default/files/peachstate-ra-cap.pdf\
    \ \u2013 PDF*.\n*People using assistive technology may not be able to fully access\
    \ information in this file. For assistance, contact OCR at (800) 368-1019, TDD\
    \ toll-free: (800) 537-7697, or by emailing [email protected].\nSource: HHS\n\
    ### Related Posts:\n  * HHS strengthens patients\u2019 right to access lab test\
    \ reports\n  * HHS: Statement of Delay in Enforcement of HIPAA\u2026\n  * No Business\
    \ Associate Agreement? $31K Mistake\n  * West Georgia Ambulance Company Pays $65,000\
    \ to\u2026\n  * Texas health system settles potential HIPAA\u2026\n"
