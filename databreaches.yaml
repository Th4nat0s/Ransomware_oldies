  data: "\n# Ransomware Unmasked: Dispute Reveals Ransomware TTPs\n  * __May 26, 2021\n\
    \  *  __Dissent\n  * \nTwo of the more well-known Russian-language forums have\
    \ \u201Carbitration\u201D or\n\u201Ccomplaint\u201D sections where members can\
    \ present complaints and evidence against\nother members involving financial disputes\
    \ or claims. Those disputes, with\nevidence provided non-publicly to the moderators/arbitrators,\
    \ often provide\ninteresting insights into threat actors\u2019 methods or relationships.\n\
    In the past few weeks, there have been two such matters of special note. One\n\
    was a claim \u2014 and counterclaim between \u201CUNKN\u201D of REvil (Sodinokibi)\
    \ and\n\u201CSignature.\u201D The second one involved claims made against DarkSide\
    \ after they\nfolded operations after their servers were taken down and monies\
    \ diverted by\nunknown parties.\nGemini Advisory has written up the first dispute\
    \ to show what they learned\nfrom the dispute. You can read their blog post on\
    \ their web site.\n### Related Posts:\n  * Apex America hit by Sodinokibi ransomware\n\
    \  * \u201CLockBit\u201D Launches Ransomware Blog, Blackmails Two Companies\n\
