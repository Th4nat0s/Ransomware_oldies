  data: "\n# A former DarkSide listing shows up on REvil\u2019s leak site\n  * __May\
    \ 26, 2021\n  *  __Dissent\n  * \nOn May 15, Chum1ng0 reported that German furniture\
    \ retailer **M\xF6belstadt\nSommerlad** had been hit by DarkSide threat actors.\
    \ By then DarkSide\u2019s leak\nsite was down and it had not been possible to\
    \ confirm whether DarkSide had\never listed the retailer as a victim or dumped\
    \ any proof of claim, but given\nthe time frame of the attack and the takedown\
    \ of DarkSide\u2019s site, it seemed\nunlikely that they had ever been listed.\
    \ It was the owner of the furniture\nstore who named DarkSide as the threat actors,\
    \ and who stated that the firm\nwould not be paying any ransom.\nAs of today,\
    \ the notice saying that the store is still not functioning remains\non their\
    \ web site (the English version):\n![Sommerlad Notice - English](https://www.databreaches.net/wp-\n\
    content/uploads/sommerlad_notice_en.jpg)IMAGE: DATABREACHES.NET\nBut also of note,\
    \ today Chum1ng0 noticed that REvil (Sodinokibi) threat actors\nlisted this attack\
    \ as their work, and claim to have more than 175 GB of data:\n> We downloaded\
    \ a lot of interesting information from your network. All data\n> are fresh and\
    \ will be stored on our CDN servers for the next 6 month if you\n> do not pay.\n\
    >\n> If you need data leak proofs, we are ready to provide them.\n![](https://www.databreaches.net/wp-\n\
    content/uploads/REvil_MobelstadtSommerlad.jpg)IMAGE: DATABREACHES.NET\nConsistent\
    \ with their usual practice, they provided some screencaps of file\ntrees.\nThe\
    \ fact that they listed the firm on their leak site suggests that M\xF6belstadt\n\
    Sommerlad\u2019s owner has not changed their mind and is continuing to refuse\
    \ to\npay any ransom, but without email and with their Facebook page not available,\n\
    it\u2019s difficult to confirm this with them.\n![](https://www.databreaches.net/wp-content/uploads/fb_526.jpg)M\xF6\
    belstadt\nSommerlad;s Facebook page on May 26, 2021. IMAGE: DATABREACHES.NET\n\
    What the listing by REvil does confirm, however, is some frequent speculation\n\
    that DarkSide and REvil had a collaborative or cooperative relationship\nsomehow.\
    \ Did one of DarkSide\u2019s affiliates now take their data to REvil to help\n\
    them with the extortion attempt? Perhaps.\n* * *\n_In collaboration with Chum1ng0.\
    \ Post-publication, I learned that this was\nfirst reported on Twitter by @z0man,\
    \ so credit to him._\n### Related Posts:\n  * De: Darkside threat actors attempted\
    \ to extort\u2026\n  * DarkSide ransomware decryptor recovers victims'\u2026\n\
    \  * DarkSide ransomware is creating a secure data leak\u2026\n  * \"We are apolitical\"\
    \ -- DarkSide threat actors\n  * More Canadian entities hit with ransomware\n"
