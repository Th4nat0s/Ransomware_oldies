  data: "\n# Updating: CaptureRx incident impacted almost 2 million people \u2013\
    \ Complete\nList of Entities\n  * __May 19, 2021\n  *  __Dissent\n  *  __2\nFor\
    \ the past two months, DataBreaches.net has been tracking reports involving\n\
    NEC Networks, LLC d/b/a **CaptureRx**. CaptureRx is a specialty pharmacy\nbenefits\
    \ manager whose services include prescription claims processing,\npatient assistance\
    \ program administration, and public health service 340B drug\nprogram administration.\
    \ CaptureRx provides these services for pharmacies and\nhealthcare providers across\
    \ the United States.\nIn February, CaptureRx became aware of a compromise of their\
    \ system(s).\nAlthough their statements have not labeled it as a \u201Cransomware\u201D\
    \ incident, at\nleast one of their covered entities has described it that way\
    \ and most of the\nmedia coverage reports it as a ransomware incident. DataBreaches.net\
    \ notes,\nhowever, that CaptureRx has not actually called it a ransomware incident,\
    \ the\nthreat actors have not been named, and there has been no disclosure as\
    \ to\nwhether there was any ransom demand, and if so, whether it was paid. The\n\
    incident has not shown up on any dedicated leak site associated with almost\n\
    two dozen ransomware groups, which can mean that: (1) the compromise was not\n\
    by any of those groups, (2) the compromise was by one of those groups but the\n\
    victim paid the ransom to keep the data from being publicly dumped, or (3) it\n\
    wasn\u2019t a ransomware incident but perhaps something like a hack with data\n\
    exfiltrated \u2014 with or without an extortion demand. We just don\u2019t know\
    \ for sure\nat this point because CaptureRx\u2019s disclosures haven\u2019t been\
    \ specific or\ndetailed on those points.\nThis week, in its newest filing with\
    \ a state regulator, we have learned that a\ntotal of **1,919,938** individuals\
    \ (presumably patients) have been impacted by\nthe incident.\nHere is an incomplete\
    \ list of covered entities that have already been reported\nto have been impacted\
    \ by a ransomware incident CaptureRx experienced. Where\nthe number of affected\
    \ patients is known, it is indicated in parentheses. We\nare obviously missing\
    \ alot of reports.\n  * Ascension St. Joseph Hospital (5807).\n  * Ascension Standish\
    \ Hospital (1705)\n  * Bayhealth (575)\n  * Brownsville Community Health Center\
    \ (4258)\n  * Faxton St. Lukes (17655)\n  * Gifford Health (6777)\n  * Lourdes\
    \ Hospital (1745)\n  * Thrifty Drug (3958)\n  * UPMC Cole and UPMC Wellsboro (7376)\n\
    \  * Walmart\n  * Jordan Valley Community Health Center (12000)\n  * Hildalgo\
    \ Medical Services (2179)\n  * Adirondack Medical Center dba Adirondack Health\
    \ (800)\n  * Kaleida Health (600)\n  * Trinity Health System (9579)\nCaptureRx\u2019\
    s first press release was issued May 5. Now they have issued a\n\u201Csecond wave\u201D\
    \ release for additional people being notified. That release\n(embedded below),\
    \ submitted to Maine\u2019s attorney general, indicates that those\nbeing notified\
    \ are not being offered any credit monitoring services.\nDataBreaches.net will\
    \ continue monitoring this incident and will update this\npost as more details\
    \ become available.\nMay 21: CaptureRx issued a complete list of entities for\
    \ whom it was making\nnotification (links added as news stories appear):\n  *\
    \ Adirondack Medical Center dba Adirondack Health\n  * Adventist Health Mendocino\
