  data: "\n# IBM gives grants to some k-12 districts to harden security against\n\
    ransomware attacks\n  * __June 2, 2021\n  *  __Dissent\n  * \nCharlie Osborne\
    \ reports:\n> All United States public K-12 school districts were eligible to\
    \ apply for\n> the grants, designed to help school officials \u201Cproactively\
    \ prepare for and\n> respond to cyberattacks.\u201D\n>\n> The grants, worth $500,000\
    \ each, have been awarded to school districts in\n> Florida (Brevard Public Schools),\
    \ New York (Poughkeepsie City School\n> District), Georgia (KIPP Metro Atlanta\
    \ Schools), Texas (Sheldon Independent\n> School District), California (Newhall\
    \ School District), and Colorado (Denver\n> Public Schools).\nRead more on ZDNet.\n\
    Some of those names rang a bell here, so I checked to see if this site has\never\
    \ reported breaches involving any of the grant recipients. Sure enough, I\nfound\
    \ that Sheldon Independent School District had been a victim of a\nransomware\
    \ attack last year and had paid ransom. Newhall School District in\nCalifornia\
    \ also suffered a ransomware incident last year. Brevard County\nSchools also\
    \ reported a data breach this past month, but it was not a\nransomware attack.\
    \ Denver Public Schools also suffered a breach in 2017, but\nit was not a ransomware\
    \ incident \u2014 it was a phishing incident that resulted in\npayroll checks\
    \ being redirected.\nZDNet reports that IBM says that applicants were judged on\
    \ their\n\u201Ccybersecurity needs and experiences, community resources and potential\n\
    risks.\u201D IBM\u2019s press release announcing the grants noted the great interest\
    \ in\nthe grants and that 1700 schools in the education sector (k-12 and post-\n\
    secondary) had reported ransomware attacks in 2020. There was tremendous\ndisparity\
    \ noted in the applicants resources, and key findings from the\napplications included:\n\
    >   * **Disparity in cybersecurity budgets:** 50% of the districts had less\n\
    > than $100,000 for cybersecurity spending \u2013 for the entire school district.\n\
    > This is in comparison to larger school districts that cited cybersecurity\n\
    > budgets in the millions.\n>   * **Ransomware attacks:** More than 40% of applicants\
    \ experienced a\n> ransomware attack.\n>   * **Security training:** More than\
    \ 55% of school districts are operating\n> without security training.\n>\nSo yes,\
    \ it\u2019s as bad as some of us have repeatedly pointed out. And with only 6\n\
    districts getting these grants, that leaves a lot of districts sitting ducks\n\
    or low-hanging fruit for attackers (pick your metaphor). But these same\ndistricts\
    \ also do not tend to have great cyberinsurance to pay any ransom or\neven pay\
    \ for remediation/recovery from an attack.\nThis week, new threat actors calling\
    \ themselves \u201CPay or Grief\u201D (or some\nvariant of that) demanded $350,000\
    \ ransom from Clover Park School District in\nWashington state. When I asked them\
    \ how they came up with that number, they\ndid not indicate that it was based\
    \ on any research into the district\u2019s\ncyberinsurance, but rather, that they\
    \ had been in their files and looked at\ninvoices, etc. Their confidence that\
    \ a k-12 district can pay that much ransom\nseems misplaced, at best.\n### Related\
    \ Posts:\n  * To add to woes, school districts now being hit with\u2026\n  * Lodi\
    \ School District Officials Report Data Breach At\u2026\n  * 11 New US School\
    \ Districts Compromised by\u2026\n  * Tangipahoa Schools in La. Discover Possible\u2026\
    \n  * How K\u201312 School Districts Can Best Prepare for\u2026\n"
