  data: "\n# One Employee\u2019s Accidental Email Leads To A Significant Data Breach\
    \ Ruling in\nFederal Appeals Court\n  * __May 26, 2021\n  *  __Dissent\n  * \n\
    Jeffrey Csercsevits of Fisher Phillips writes:\n> A federal appeals court recently\
    \ addressed whether employees had standing to\n> bring a lawsuit when their personally\
    \ identifiable information (PII) was\n> inadvertently circulated to other employees\
    \ at the company, with no\n> indication of misuse or external disclosure. In _McMorris\
    \ v. Carlos Lopez&\n> Associates, LLC_, the 2nd Circuit Court of Appeals (hearing\
    \ cases from New\n> York, Connecticut, and Vermont) determined that the particular\
    \ plaintiffs at\n> issue did not have standing and that their mere fear of identity\
    \ theft was\n> insufficient for them to sustain a claim for relief. Importantly,\
    \ however,\n> the court set forth a three-part framework for how standing could\
    \ be\n> established in a similar situation.\nRead more on JDSupra.\n### Related\
    \ Posts:\n  * In major ruling, 2nd Circuit says no circuit split\u2026\n  * Circuit\
    \ Split No More: 2nd Circuit Clarifies Article\u2026\n  * The Standing Struggle\
    \ in Data Breach Litigation Continues\n  * CareFirst Data Breach Case Moves to\
    \ US Supreme Court\n  * OPM Data Breach Plaintiffs, in Bid to Revive Case,\u2026\
    \n"
