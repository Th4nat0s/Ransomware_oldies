  data: "\n# WA: Clover Park School District investigating ransomware attack\n  *\
    \ __May 26, 2021\n  *  __Dissent\n  *  __2\nKevin Ko reports:\n> Facing a \u201C\
    system outage,\u201D the Clover Park School District is investigating\n> why it\u2019\
    s \u201Cexperiencing a technology issue,\u201D a district spokesperson said in\n\
    > a statement.\n>\n> \u201CWe are working with third-party cybersecurity specialists\
    \ to investigate\n> the root cause of this system outage and will provide more\
    \ information as\n> our investigation continues,\u201D the statement reads.\n\
    Read more on KIRO7, who was sent screencaps by an employee. The screencap\nindicates\
    \ that CPSD was the victim of a ransomware attack by what appears to\nbe a new\
    \ group or relatively unknown group of threat actors who appear to be\ncalling\
    \ themselves \u201CPayOrG\u201D (PayOrGrief). The attackers have demanded $350,000\n\
    in ransom and have given the district 21 days to pay or have data dumped. They\n\
    do not provide any proof of claims, but do offer to decrypt a \u201Ccouple files\u201D\
    \nas proof if contacted via chat.\n![Ransom note](https://www.databreaches.net/wp-\n\
    content/uploads/grief_list.jpg)Threat actors\u2019 ransom note. IMAGE: KIRO7\n\
    DataBreaches.net is not publishing the url of the leak site.\nOne tweet in the\
    \ district\u2019s timeline earlier today announced:\n> CPSD experiencing a temporary\
    \ tech issue. Follow district\u2019s Power & Internet\n> Outage Guidance. Students\
    \ participating in virtual learning @home will\n> continue w/classwork from home;\
    \ students scheduled for in-person learning\n> @school will continue on schedule.\
    \ We\u2019ll provide updates.\n>\n> \u2014 Clover Park Schools (@CloverParkSD)\
    \ May 26, 2021\n> _CPSD experiencing a temporary tech issue. Follow district\u2019\
    s Power &\n> Internet Outage Guidance. Students participating in virtual learning\
    \ @home\n> will continue w/classwork from home; students scheduled for in-person\n\
    > learning @school will continue on schedule. We\u2019ll provide updates._\nNone\
    \ of their subsequent tweets today referred to the problem or provided any\nupdate,\
    \ however. Attempts to connect to the district\u2019s web site tonight timed\n\
    out.\n### Related Posts:\n  * NY: Floral Park-Bellerose school district hit with\u2026\
    \n  * SC: Pickens County School District internet outage\u2026\n  * TX: Weslaco\
    \ ISD network hacked, FBI investigating\n  * Two more k-12 school districts allegedly\
    \ hit by\u2026\n  * IL Ransomware attack hits Sycamore School District 427\n"
