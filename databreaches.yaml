  author: ''
  custom: !!set {}
  data: "\n# 20/20 Eye Care Network and Hearing Care Network notify 3,253,822 health\
    \ plan\nmembers of breach that deleted contents of AWS buckets\n  * __June 1,\
    \ 2021\n  *  __Dissent\n  * \n**20/20 Eye Care Network, Inc**. is a managed vision\
    \ care company in Florida\nthat offers administrative services to health plans.\
    \ **20/20 Hearing Care\nNetwork** expands those services into hearing care.\n\
    On May 28, 20/20\u2019s Chief Compliance Officer notified the Maine Attorney\n\
    General\u2019s Office of an incident in which their Amazon AWS S3 buckets were\n\
    accessed and data deleted. As they describe it in their notification to those\n\
    affected:\n> On January 11, 2021, 20/20 was alerted to suspicious activity in\
    \ its Amazon\n> Web Services (\u201CAWS\u201D) environment. In response, access\
    \ credentials to the AWS\n> environment were reviewed and deactivated/reset, and\
    \ other responsive\n> security measures were immediately put into place. In response\
    \ to the\n> deletion event, 20/20 promptly notified the FBI. After reviewing available\n\
    > evidence, the investigation determined that on January 11, 2021, data was\n\
    > potentially removed from the S3 buckets hosted in AWS and all the data in\n\
    > the S3 buckets was then deleted. The forensic investigation continued, and\n\
    > in late February, 20/20 determined the data could have potentially included\n\
    > information about some or all health plan members for whom it had records.\n\
    >\n> At this time, 20/20 has notified the relevant health plans believed to have\n\
    > been impacted as a result of this event. Subsequently, an exhaustive review\n\
    > to determine what specific data may be at risk and to whom that information\n\
    > relates was conducted. Upon completion of the review and verification of the\n\
    > data, 20/20 notified individuals and relevant regulators as soon as\n> possible.\n\
    >\n> The information that could have been subject to unauthorized access includes\n\
    > name, address, Social Security number, member identification number, date of\n\
    > birth, and health insurance information.\nIt appears that they could not conclusively\
    \ determine what/which data had been\naccessed and possibly exfiltrated and what\
    \ data had been deleted, but it\nsounds like all the data in the buckets was deleted.\n\
    The total number of persons affected nationwide was reported as 3,253,822.\nThose\
    \ being offered free credit monitoring services are being offered 12\nmonths of\
    \ credit monitoring, identity restoration services, and fraud\nconsultation through\
    \ TransUnion.\nThe incident is somewhat shrouded in confusion. What actually happened,\
    \ and\nwhat was the motivation of the threat actor? Their report to the state\
    \ coded\nthe incident as \u201Cinsider wrongdoing,\u201D but there is nothing\
    \ in the notification\nto affected members to indicate that the entities suspected\
    \ a rogue employee\nwas responsible. So was this a threat actor like \u201CMeow\u201D\
    \ just maliciously\ndeleting the contents of misconfigured s3 buckets, or were\
    \ data stolen for\nfuture misuse? We do not seem to have clear answers.\nDataBreaches.net\
    \ has emailed their compliance officer to seek clarification on\nwhy they reported\
    \ this as \u201Cinsider wrongdoing\u201D and will update this post when\na reply\
    \ is received.\n### Related Posts:\n  * Gulf Coast Health Care Services network\
    \ incident\u2026\n  * CareCentrix notifies home care patients after their\u2026\
    \n  * Calif. doc network chooses enterprise software,\u2026\n  * Owner and Administrator\
    \ of Two Miami Home Health\u2026\n  * Metro Community Provider Network settles\
    \ HHS breach\u2026\n"
