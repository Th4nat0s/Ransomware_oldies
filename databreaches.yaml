  data: "\n# UMD-Baltimore updates Accellion breach notification after finding PII\
    \ and\nPHI involved\n  * __May 29, 2021\n  *  __Dissent\n  * \nOn April 1, DataBreaches.net\
    \ reported that the University of Maryland,\nBaltimore was one of the educational\
    \ entities impacted by the CLOP hack and\nexfiltration of Accellion client data,\
    \ but that neither UMD nor Accellion even\nknew that until the last week in March.\n\
    This week, the university issued an updated press release that reveals that\n\
    personal and protected health information was involved after all. In their May\n\
    28 notice they write, in part:\n> The investigation is ongoing, but files varied\
    \ by individual and included\n> various types of data elements such as name, demographic\
    \ information,\n> birthdate, diagnosis, social security number, driver license,\
    \ provider name,\n> health and related benefit information.\n>\n> UMB has notified\
    \ and is continuing to notify affected individuals by mail at\n> the last known\
    \ address as our investigation identifies them. As always,\n> individuals are\
    \ being advised to remain vigilant and monitor financial\n> account statements\
    \ and credit reports carefully and report any discrepancies\n> to law enforcement,\
    \ and we encourage activation of fraud alerts and security\n> freezes. UMB provides\
    \ identity theft monitoring as required by law.\nSo to recap: Accellion had notified\
    \ them that no sensitive data had been\ninvolved for them. Then UMD found data\
    \ on CLOP\u2019s leak site and start\ninvestigating. And now \u2014 almost 5 months\
    \ after the initial attack on\nAccellion, they are first able to start notifying\
    \ people.\nUMD stopped using Accellion\u2019s service in February.\n### Related\
    \ Posts:\n  * University of Maryland, Baltimore responds to\u2026\n  * Arizona\
    \ Complete Health notifies plan members of\u2026\n  * Trillium Community Health\
    \ Plan members impacted by\u2026\n  * University of Colorado responds to Accellion\
    \ breach\n  * Mandiant issues final report on its investigation\u2026\n"
