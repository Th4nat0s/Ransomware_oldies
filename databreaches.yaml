  data: "\n# Ethical disclosures are being ignored: an unchecked security crisis\n\
    \  * __May 31, 2021\n  *  __Dissent\n  * \nRon Nahamias, Cyberpion co-founder\
    \ and CBO, has a piece in _Security Magazine_\nthat includes a topic near and\
    \ dear to my heart \u2014 companies that do not\nprovide a way to notify them\
    \ of a security breach, leak, or vulnerability. He\nwrites, in part:\n> Sometimes\
    \ the burying of the head in the sand, even if it\u2019s borne out of\n> desperation\
    \ and a practice of being overworked and understaffed, turns into\n> something\
    \ deliberate.\n>\n> But while companies are dragging their feet, bad actors are\
    \ mobilizing their\n> armies. In my own work, I\u2019ve met CISOs \u2014 more\
    \ than I care to admit \u2014 who\n> create an email address that doesn\u2019\
    t even fit their company\u2019s standard. This\n> makes them harder to contact,\
    \ and therefore, essentially impossible to\n> alert. Some organizations\u2019\
    \ existing disclosure programs are even designated\n> as \u201Ctop secret,\u201D\
    \ bound by strict NDAs and accessible by invitation only. The\n> drawbridge is\
    \ always up; the moat is considered impossible. And what\n> organizations don\u2019\
    t know, they are not beholden to either address or\n> resolve. I\u2019ve also\
    \ run into plenty of organizations who declare outright\n> that they don\u2019\
    t want to want to receive disclosures, because they have no\n> desire and / or\
    \ no capacity to deal with the liabilities created by them.\nRead more on Security\
    \ Magazine.\nFor the last 15 years, I have been loudly yelling that entities should\
    \ be\nrequired to have monitored accounts/contact information displayed on their\
    \ web\nsite that tells people how to contact them to report a breach (or leak\
    \ or any\nsecurity concern). The current situation remains lopsided: ethical researchers\n\
    have a duty to disclose responsibly, but entities have no legal obligation to\n\
    make such disclosure possible and successful by providing working and\nmonitored\
    \ contact methods.\nIsn\u2019t it time the government made this mandatory? Isn\u2019\
    t it time, already?\n### Related Posts:\n  * 7 security incidents that cost CISOs\
    \ their jobs\n  * Is It Ethical To Buy Breached Data?\n  * Ransomware attackers\
    \ pledge to back off attacking\u2026\n  * Data Breach at Mitsubishi Electric Caused\
    \ by\u2026\n  * Major Japanese Defense Contractors Admit to Data\u2026\n"
