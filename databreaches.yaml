  author: ''
  custom: !!set {}
  data: "\n# Babuk re-organizes as Payload Bin, offers its first leak\n  * __May 31,\
    \ 2021\n  *  __Dissent\n  * \nAt the end of April, threat actors known as Babuk\
    \ indicated that they were\nclosing up shop and switching to a different model:\n\
    > Babuk changes direction, we no longer encrypt information on networks, we\n\
    > will get to you and take your data, we will notify you about it if you do\n\
    > not get in touch we make an announcement.\n>\n> Also for other groups that do\
    \ not have their own blog or have but they want\n> to exert additional pressure,\
    \ you can not be placed with us.\nTwo weeks later, they wrote:\n> Hello! We announce\
    \ the development of something really cool, a huge platform\n> for independent\
    \ leaks, we have no rules and bosses, we will publish private\n> products in a\
    \ single information platform where we will post leaks of\n> successful no-name\
    \ teams that do not have their own blogs and names, these\n> are not girls who\
    \ run with ship like rats and change the policy of their\n> resources. these are\
    \ really strong guys.\n>\n> Another loud leak awaits you within a week.\nToday,\
    \ we began to see the changes as the site is now called Payload Bin.\n![](https://www.databreaches.net/wp-content/uploads/payload_bin.jpg)Image:\n\
    DataBreaches.net\nThe About and Rules pages are not available yet and so far there\
    \ is only one\nleak listed under Announcements: CD Projekt. CD Projekt was attacked\
    \ in\nFebruary by attackers using what is believed to be the Hello Kitty ransomware.\n\
    The hackers had put the stolen source code up for sale on a Russian-language\n\
    forum, listing it all as:\n  * Full sources for the games **Thronebreaker** ,\
    \ **Witcher 3** , the undeclared **Witcher 3 RTX** (the version of the Witcher\
    \ with raytracing) and of course **Cyberpunk 2077**\n  * Dumps of internal documents\n\
    \  * **CD Projekt RED** offenses .\nThey subsequently withdrew the auction listing,\
    \ claiming that they had\nreceived a satisfactory offer from outside of the forum,\
    \ and that because of a\ncondition of no further distribution, they were removing\
    \ the listing from\nauction.\n![](https://www.databreaches.net/wp-content/uploads/auction1.png)Source\
    \ code\nwithdrawn from auction. Image: DataBreaches.net\nNow Payload Bin says\
    \ they will make all source code available on its site. So\nwhat, exactly, happened\
    \ to that sale with \u201Cno further distribution?\u201D\n![](https://www.databreaches.net/wp-\n\
    content/uploads/cdprojekt_source.jpg)Image: DataBreaches.net\n### Related Posts:\n\
    \  * Babuk closes one shop, switches to RaaS?\n  * Houston Rockets Hit by \u201C\
    Babuk\u201D Ransomware\n  * Sekurak blog interviewed Babuk about Metropolitan\
    \ DC\u2026\n  * Negotiations fail, threat actors dump more data from\u2026\n \
    \ * Phone House Spain hit by Babuk ransomware, 3 million\u2026\n"
