  data: "\n# Au: BLK Sport reveals DarkSide attack\n  * __May 30, 2021\n  *  __Dissent\n\
    \  * \nOn May 26, **BLK Sport** disclosed that they had been attacked by DarkSide\
    \ on\nApril 21, 2021.\nOf note, the firm states that they have to assume that\
    \ information may have\nbeen exfiltrated (because that\u2019s how DarkSide normally\
    \ operated), but they\nhave been unable to actually determine the extent of any\
    \ information theft.\nAccording to their notification, the information the hackers\
    \ may have stolen\nincludes:\n  * customer names, addresses, contact details (eg\
    \ phone numbers, email addresses and the name of any customer representative),\
    \ contract information and order information; and\n  * the names, addresses, contact\
    \ details (eg phone numbers, email addresses and the name of any supplier representative),\
    \ contract information, order information and bank account information of people\
    \ (including companies) who supply goods or services to us.\nThey note:\n> We\
    \ do **_not_** believe that information held in our systems which run on\n> servers\
    \ outside BLK has been compromised. In particular, we do not believe\n> that usernames\
    \ and passwords for BLK\u2019s online ordering system, or credit\n> card or other\
    \ payment information which may have been input into that\n> system, have been\
    \ stolen.\nIt is possible, however, that information provided to them via email\
    \ may have\nbeen compromised.\nYou can read the full notification on their web\
    \ site.\n### Related Posts:\n  * DarkSide ransomware decryptor recovers victims'\u2026\
    \n  * Secret Chats Show How Cybergang Became a Ransomware\u2026\n  * Telstra customer\
    \ stumbles across contact details of\u2026\n  * DarkSide ransomware is creating\
    \ a secure data leak\u2026\n  * \"We are apolitical\" -- DarkSide threat actors\n"
