  data: "\n# Steamship Authority hit by ransomware attack\n  * __June 2, 2021\n  *\
    \  __chum1ng0\n  * \nTony Fay reports:\n> Passengers going to Nantucket and Martha\u2019\
    s Vineyard via the Steamship\n> Authority may have to deal with possible delays\
    \ Wednesday, due to a\n> ransomware attack.\n>\n> The ferry service posted on\
    \ their official Twitter account Wednesday that\n> the attack is affecting their\
    \ operations, and that a team of IT\n> professionals is currently working to assess\
    \ the impact of the attack. More\n> information is expected to be released once\
    \ that initial assessment is\n> completed.\nRead more on WWLP.\nThe disruption\
    \ was announced on the service\u2019s Twitter account:\n> The Woods Hole, Martha\u2019\
    s Vineyard and Nantucket Steamship Authority has been\n> the target of a ransomware\
    \ attack that is affecting operations as of\n> Wednesday morning. As a result,\
    \ customers traveling with us today may\n> experience delays. 1/2\n>\n> \u2014\
    \ Steamship Authority (@SteamshipMA) June 2, 2021\n> A team of IT professionals\
    \ is currently assessing the impact of the attack.\n> Additional information will\
    \ be provided upon completion of the initial\n> assessment. 2/2\n>\n> \u2014 Steamship\
    \ Authority (@SteamshipMA) June 2, 2021\nThe service\u2019s web site remains unavailable\
    \ at the time of this posting. An\nearlier \u201CSorry About That\u201D notice,\
    \ below, has since been replaced by a message\non another domain that they have\
    \ redirected to. The current notice reads, \u201CThe\nSteamship Authority\u2019\
    s website is currently unavailable. We are working to\nresolve the issue as quickly\
    \ as possible. We apologize for the inconvenience.\u201D\n![Notice on Site](https://www.databreaches.net/wp-\n\
    content/uploads/steamship_authority.png)Screencap: DataBreaches.net\nThe service\
    \ has not indicated the type of ransomware involved or the amount of\nany ransom\
    \ demand.\n* * *\n_Editing and additional material by Dissent_\n### Related Posts:\n\
    \  * Louisville Regional Airport Authority hit by\u2026\n  * GA: Jekyll Island\
    \ Authority computer system\u2026\n  * GA: JIA sends notices to those potentially\
    \ affected\u2026\n  * MA: Payroll system compromised in ransomware attack\u2026\
    \n  * NZ: Volunteer Service Abroad targetted by\u2026\n"
