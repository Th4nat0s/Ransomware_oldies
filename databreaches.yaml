  data: "\n# NH: Sentenced to Over a Year in Prison for Hacking Police Department\
    \ in\nRevenge for Drug Arrest\n  * __May 25, 2021\n  *  __Dissent\n  * \nWayne\
    \ Kenney, 31, of Hooksett, was sentenced to 12 months and one day in\nfederal\
    \ prison for unauthorized access to a computer and damage to protected\ncomputers,\
    \ Acting United States Attorney John J. Farley announced today. ****\n**** According\
    \ to court documents and statements made in court, in early 2015,\nKenney was\
    \ arrested by a police officer with the Auburn Police Department\n(hereafter referred\
    \ to as \u201CJohn Doe 1\u201D to protect his identity) for possession\nof heroin,\
    \ for which he received a suspended sentence and was required to\nattend drug\
    \ counseling sessions at the Farnum Center, an addiction treatment\ncenter located\
    \ in Manchester. Thereafter, Kenney engaged in a retributive\ncourse of action\
    \ that involved hacking into various computers of the Auburn\nPolice Department,\
    \ the Town Offices of Auburn, and the Farnum Center.\nFrom February 2015 through\
    \ July 2015, Kenney hacked into Auburn Police\nDepartment and Town of Auburn computers\
    \ and deployed malicious \u201Ckeylogging\u201D\nsoftware that he created, and\
    \ stole employees\u2019 log-in credentials. He then\nhacked into, deleted files\
    \ from, and defaced employees\u2019 online accounts. In\naddition, Kenney deployed\
    \ malicious software that caused pop up messages to\nappear that stated \u201C\
    I pray for the death of [John Doe 1].\u201D\nAlso according to court documents,\
    \ on or about July 1, 2015, Kenney hacked\ninto the website for the Farnum Center\
    \ and took control of the site. He\ndisabled a link that would have provided website\
    \ visitors access to\ninformation about alcohol and drug treatment assistance.\
    \ He also changed their\n24-hour emergency drug hotline phone number so that anyone\
    \ calling for help\nwould be re-routed to a number associated with adult entertainment\
    \ services\nand would be unable to reach the Farnum Center\u2019s emergency services.\n\
    Kenney previously pleaded guilty on November 18, 2021.\n\u201CThe defendant\u2019\
    s reprehensible actions caused significant harm to entities\nthat seek to help\
    \ the public,\u201D said Acting U.S. Attorney Farley. \u201CBy disabling\naccess\
    \ to drug and alcohol treatment information, the defendant cruelly\nimpeded innocent\
    \ people from getting help for their substance abuse problems.\nHis actions also\
    \ harmed innocent public servants in Auburn. To protect the\ncommunity from such\
    \ crimes, we work closely with the FBI to identify and\nprosecute computer hackers.\u201D\
    \n__ \u201CThe facts of this case speak for themselves. You can\u2019t hide in\
    \ the shadows\nof the internet and hack into computers and impede others from\
    \ accessing\nemergency substance abuse treatment services and get away with it,\u201D\
    \ said\nJoseph R. Bonavolonta, Special Agent in Charge of the FBI Boston Division.\n\
    \u201CToday\u2019s sentence holds Wayne Kenney accountable for his vindictive\
    \ crimes and\nshould serve as a warning to others that the FBI will continue to\
    \ work with\nour law enforcement partners to thoroughly investigate all cyber\
    \ intrusions\nand hold the criminals behind them accountable.\u201D\nThis case\
    \ was investigated by the Federal Bureau of Investigation. The case\nwas prosecuted\
    \ by Senior Trial Attorney Mona Sedky of the Computer Crime and\nIntellectual\
    \ Property Section of the Justice Department\u2019s Criminal Division\nand Assistant\
    \ U.S. Attorney Georgiana L. MacDonald of the District of New\nHampshire. Former\
    \ Assistant U.S. Attorney Arnold H. Huftalen previously worked\non this matter.\n\
    Source: U.S. Attorney\u2019s Office, District of New Hampshire\n### Related Posts:\n\
    \  * NH: Former Manchester Police Officer Pleads Guilty\u2026\n  * Tampa Man Sentenced\
    \ To More Than Five Years In\u2026\n  * Texas man sentenced in medical identity\
    \ theft case\n  * Former correctional officer sentenced to prison for\u2026\n\
    \  * Former Cambridgeshire detective sentenced for theft\u2026\n"
