  data: "\n# IA: Union Community School District publicly silent after threat actors\
    \ dump\nfiles on dark web\n  * __June 1, 2021\n  *  __Dissent\n  * \nIn a year\
    \ when they were already dealing with COVID-19 and then accusations\nthat a teacher\
    \ had improper emails with students, **Union Community School\nDistrict** in Iowa\
    \ found itself with a third major challenge \u2014 a ransomware\nattack. But whereas\
    \ the district has publicly acknowledged and discussed its\nresponse to the first\
    \ two challenges, they seem to have maintained radio\nsilence about the cybersecurity\
    \ incident. That may be about to change.\nAs best as DataBreaches.net can determine,\
    \ the district experienced a\ncyberattack prior to April 19. How much before then\
    \ is as yet unknown to this\nsite. But now that the threat actors have dumped\
    \ thousands of files with\nemployees\u2019 and students\u2019 personal information\
    \ on the dark web,\nDataBreaches.net expects the district will issue some public\
    \ notice. So far,\nhowever, this breach has not been confirmed by the district\
    \ (unless this site\nmissed some notice).\n![DoppelPaymer Added Union to their\
    \ Leak\nSite](https://www.databreaches.net/wp-content/uploads/Doppel_listing.jpg)On\n\
    April 19, threat actors added the district to a dark web leak site where\nvictim\
    \ data is dumped. Image: DataBreaches.net\nOn April 19, the DoppelPaymer ransomware\
    \ threat actors added the school\ndistrict to its list of victims who have not\
    \ paid their ransom demand.\nDoppelPaymer threat actors, who are widely believed\
    \ to be Russian, tend to use\nthe \u201Cdouble-extortion\u201D model that involves\
    \ exfiltrating a copy of files and\nthen encrypting the files on the server so\
    \ that the victims needs to pay them\nto get a decryptor key to unlock their files.\
    \ But even if the victim can\nunlock their files, the criminals still have a copy\
    \ of the files that they\nwill dump publicly or sell if their victim doesn\u2019\
    t pay them.\nThe threat actors do not indicate in the listing when they first\
    \ attacked the\ndistrict or contacted them with any ransom demand, but on May\
    \ 28, the threat\nactors updated their listing of April 19 and dumped thousands\
    \ of files. They\nalso posted a list of every computer on the district\u2019s\
    \ network.\nThe file dump, compromising almost 2 GB of compressed files, contained\n\
    numerous files with personal and personnel information on former and current\n\
    employees as well as personal information on current and former students.\nDataBreaches.net\
    \ did not tabulate the number of unique employees or students\nwho had personal\
    \ information made publicly available on the dark web, but\nnotes that the employee\
    \ files included observtions of teachers and staff,\nincluding intensive assistance\
    \ plans to address noted deficiencies and in some\ncases, termination letters.\
    \ Files with employees\u2019 personal addresses, phone\nnumbers, name of spouse\
    \ or partner, and their birthday were also in the dump,\nas were salary schedules\
    \ with employees\u2019 rate of pay, date of hire, Social\nSecurity numbers, and\
    \ other types of certification data and expiration dates.\nStudent-related files\
    \ include lists of all students in every class and grade,\nbut also some disciplinary\
    \ incidents involving named students. There were also\nfiles with named students\
    \ and Student Reporting in Iowa (SRI) information, and\nthousands of transcripts\
    \ of students who graduated between 2003 and 2019.\n![Redacted Directory of Files](https://www.databreaches.net/wp-\n\
    content/uploads/transcripts.jpg)Small portion of thousands of files with\ngraduating\
    \ senionrs\u2019 transcripts. Credit: DataBreaches.net\nEach transcript contained\
    \ the student\u2019s name, their date of birth, their full\naddress, the date\
    \ of their graduation, and all of the courses they took in\nhigh school with their\
    \ grades and credits earned.\nThere were also a few files with more sensitive\
    \ information on students, such\nas the 504 Accommodation Plan for a named student.\
    \ The following image is a\nscreencap of the top of a 504 Plan, redacted by DataBreaches.net:\n\
    ![504 Accommodation Plan](https://www.databreaches.net/wp-\ncontent/uploads/504_r.png)Image:\
    \ Redacted by DataBraches.net. Typographical\nerrors were in the original.\nThe\
    \ files dumped by DoppelPaymer do not include all the files you would expect\n\
    to find on a school district\u2019s system. It may be that the threat actors are\n\
    still holding out other records to try to get the district to pay them not to\n\
    dump the data. Then again, it is possible that the threat actors did not get\n\
    those files. Because the district has not issued any public statement that\nDataBreaches.net\
    \ could find, it is not clear whether the district even knows\nthe full scope\
    \ of the breach.\nDataBreaches.net reached out to the district\u2019s superintendent,\
    \ Travis\nFleshner, to ask a number of questions about this incident, including\
    \ whether\nit had impacted the district\u2019s functioning at all, and whether\
    \ the district\nhas notified anyone whose personal information has been exfiltrated\
    \ and\ndumped. No answer was immediately forthcoming, and none of the minutes\
    \ from\nschool board meetings over the past months mention any incident or incident\n\
    response. If the district hired any external counsel or recovery services, it\n\
    is not evident in the public records. DataBreaches.net has also emailed all of\n\
    the current Board of Education members to ask them about the incident and\ntheir\
    \ knowledge of it. This post will be updated if a reply is received.\nDoppelPaymer\
    \ also recently dumped files with sensitive information from the\nthe Azusa Police\
    \ Department.\n### Related Posts:\n  * IA: Fort Dodge Community School District\
    \ to reopen\u2026\n  * Souderton Area School District Contending With\u2026\n\
    \  * Massachusetts school district shut down by ransomware attack\n  * Data from\
    \ Indiana and Oregon school districts dumped\u2026\n  * Two more k-12 school districts\
    \ allegedly hit by\u2026\n"
