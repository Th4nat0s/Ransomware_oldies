  data: "\n# How to Negotiate with Ransomware Hackers\n  * __May 31, 2021\n  *  __Dissent\n\
    \  * \nRachel Monroe has an interesting profile of a ransom negotiator in _The\
    \ New\nYorker_. But the piece also provides an answer to a puzzling claim in a\
    \ blog\npost by REvil that referred to fraudulent middlemen.\nWhen the negotiator\
    \ hired by a victim entered the chat, they discovered that\nsomeone had already\
    \ been negotiating with the threat actors \u2014 and they had\ndone what appeared\
    \ to be a terrible job. But who were these people who were\nnegotiating when it\
    \ this firm that had been retained to do that?\n> Fowler and Minder tried to piece\
    \ together what had happened. The clients\n> insisted that they had never gone\
    \ to the dark-Web site, much less interacted\n> with the hacker. Then Fowler reminded\
    \ Minder about a recent post on REvil\u2019s\n> blog, warning about fraudulent\
    \ middlemen who said that they could decrypt\n> files; instead, the middlemen\
    \ would secretly negotiate with the hackers\n> before offering the decrypted files\
    \ at a markup. At the time, it had amused\n> Minder that a cybercrime syndicate\
    \ was issuing a warning about scammers. But\n> now the clients acknowledged that\
    \ they had reached out to MonsterCloud, a\n> Florida company that advertises itself\
    \ as \u201Cthe world\u2019s leading experts in\n> Cyber Terrorism & Ransomware\
    \ Recovery.\u201D MonsterCloud\u2019s Web site encouraged\n> victims to use its\
    \ ransomware-removal services instead of paying a ransom.\n> That pitch likely\
    \ appealed to the heads of the engineering firm, who were\n> \u201Cvery, very\
    \ patriotic,\u201D Minder told me. \u201CIt didn\u2019t surprise me at all that\n\
    > they\u2019d rather pay a software company in Florida\u201D than send a ransom\
    \ to a\n> foreign criminal syndicate.\n>\n> Minder soon learned that, shortly\
    \ after the REvil hacker demanded sixty-five\n> thousand dollars, a MonsterCloud\
    \ representative told the engineering firm\n> that it could recover the files\
    \ for a hundred and forty-five thousand\n> dollars. (MonsterCloud declined to\
    \ comment.)\n>\n> According to an investigation by ProPublica, MonsterCloud has\
    \ a long track\n> record of secretly negotiating with hackers.\nRead more on The\
    \ New Yorker. The FTC was made aware of MonsterCloud\u2019s claims\nto clients,\
    \ which raise questions about whether it is deceptive to tell a\nclient that they\
    \ are not paying ransom if you are using part of your fee\nprecisely to pay the\
    \ ransom to get the decryptor. Is the FTC actually\ninvestigating this firm? Investigations\
    \ are non-public, so we do not know, but\nProPublica had also investigated this\
    \ firm.\nAnd how many more firms may be doing what MonsterCloud has allegedly\
    \ done? And\nare they all adhering to guidelines about not making payments to\
    \ entities on\nthe banned list?\n### Related Posts:\n  * UK: Latest on ransomware\
    \ attack on 24 schools near Bristol\n  * Ransomware Attacks During COVID-19\n\
    \  * The Trigano company victim of a cyberattack, the\u2026\n  * Broward County\
    \ Public Schools Cyberattack was\u2026\n  * Apex America hit by Sodinokibi ransomware\n"
