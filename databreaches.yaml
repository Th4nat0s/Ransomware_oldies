  data: "\n# Secret Chats Show How Cybergang Became a Ransomware Powerhouse\n  * __May\
    \ 31, 2021\n  *  __Dissent\n  * \nThere\u2019s an interesting piece by  Andrew\
    \ E. Kramer, Michael Schwirtz and Anton\nTroianovski in the _New York Times_ :\
    \ Secret Chats Show How Cybergang Became a\nRansomware Powerhouse. The reporters\
    \ obtained access to the internal dashboard\nthat DarkSide customers used to organize\
    \ and carry out ransom attacks and\ntheir piece provides some insights as to how\
    \ DarkSide \u201Csupport\u201D dealt with its\ncustomers and victims.\nBeyond\
    \ that piece, however, and in recent days, a Russian-language forum that\nDarkSide\
    \ had used to recruit affiliates banned them. The ban came after a\nself-described\
    \ affiliate sought to obtain monies allegedly owed to him from a\nsuccessful attack\
    \ and payment, but DarkSide denied knowing him or the alleged\ntransactions. The\
    \ claimant, who said he had no access to logs because DarkSide\nhad closed things\
    \ down, was unable to name the victim company/target or\nprovide hard proof to\
    \ the arbitratror. As a result, the forum\nadministrator/arbitrator was unable\
    \ to approve the claim, and the self-\ndescribed affiliate publicly accused DarkSide\
    \ of pulling an exit scam. Their\nclaim was not the only claim DarkSide denied/refused,\
    \ but they were the only\nones to go public about the dispute.\nDarkSide was banned\
    \ from the forum shortly thereafter.\n### Related Posts:\n  * DarkSide ransomware\
    \ is creating a secure data leak\u2026\n  * DarkSide ransomware decryptor recovers\
    \ victims'\u2026\n  * Ransomware Unmasked: Dispute Reveals Ransomware TTPs\n \
    \ * A second Russian-language hacking forum bans\u2026\n  * Cluley: \"Frankly,\
    \ sometimes paying the ransom is a\u2026\n"
