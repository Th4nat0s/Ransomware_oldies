  data: "\n# More than 11,000 people\u2019s personal information released in Anchorage\
    \ Police\nDepartment data leak\n  * __June 2, 2021\n  *  __Dissent\n  * \nKavitha\
    \ George reports:\n> Since 2019, 11,402 people have had their birth dates and\
    \ driver\u2019s license\n> numbers published accidentally, due to a glitch in\
    \ the Anchorage Police\n> Department records system, the department announced\
    \ Wednesday.\n>\n> APD said an employee discovered the issue with traffic collision\
    \ report\n> records in February. Normally, a computer automatically redacts that\n\
    > personal information in records before they are published online. Captain\n\
    > Sean Case said the department identified a simple reason why the records\n>\
    \ were going out unredacted.\n>\n> \u201CFor lack of a better word, there\u2019\
    s a toggle switch, there\u2019s a box you check\n> on that has the public traffic\
    \ collision report redacted,\u201D he said. \u201CAnd\n> that box or that toggle\
    \ switch was unchecked.\u201D\nRead more on APM.\n### Related Posts:\n  * (Update)\
