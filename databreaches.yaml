  data: "\n# It: Municipality of Porto Sant\u2019Elpidio publicly quiet after ransomware\n\
    attack and partial dump of files\n  * __May 29, 2021\n  *  __Dissent\n  * \nThis\
    \ week, DataBreaches.net reported on a new dedicated leak site and threat\nactors\
    \ who had hit Clover Park School District in Washington.\nThe same threat actors,\
    \ whose name is not even clear (are they PayOrGrief or\nGrief_List or\u2026) have\
    \ listed three other victims on their site who presumably\ndid not pay their ransom\
    \ demands. One of them is the municipality of **Porto\nSant\u2019Elpidio**in Italy.\
    \ Marco A. De Felice reports about that incident on\nSuspect File, noting that\
    \ \u201CAbout 900 MB for a total of about 1000 files have\nbeen dumped.\u201D\
    \ According to the threat actors, the total amount of stolen\nmaterial is about\
    \ 8 GB.\nDe Felice describes the data dump as mostly administrative files, but\
    \ also\nfiles containing sensitive information on residents. In skimming the data\n\
    dump, DataBreaches.net did see one report on a vehicle accident that\nidentified\
    \ the car, the owner, the driver, and that there were injuries, etc.\nHow many\
    \ other files may also contain personal information is not known to\nDataBreaches.net\
    \ at this time.\nThere is nothing currently posted on the municipality\u2019s\
    \ web site about any\nattack, and no press releases or any news coverage that\
    \ DataBreaches.net can\nfind other than Suspect File\u2019s coverage. De Felice\
    \ tried to find out what the\ngovernment has done in response to the attack:\n\
    > Before the publication of this article SuspectFile tried to get in touch\n>\
    \ with the Mayor via e-mail, asking to answer some questions. We asked, among\n\
    > other things, whether or not the Administration had complied with the\n> provisions\
    \ contained in the European Union regulation on the processing of\n> personal\
    \ data and privacy ( GDPR ) and if it had therefore already informed\n> the Guarantor\
    \ and the bodies of Competent police.\n>\n> In the e-mail we sent, a copy was\
    \ made of the President of the City Council,\n> the Councilor for the budget /\
    \ transparent Administration and the Local\n> Police Command of the Municipality.\
    \ We have not received any responses at\n> the moment.\nAs I understand it, the\
    \ GDPR at Article 33 requires that, in the event of a\npersonal data breach, data\
    \ controllers should notify the appropriate\nsupervisory authority without undue\
    \ delay and, where feasible, not later than\n72 hours after having become aware\
    \ of it. If the threat actors really waited\n21 days before dumping data, then\
    \ the municipality may have known about this\nbreach for weeks. What, if anything,\
    \ have they done in response?\nThere is much we do not yet know \u2014 about this\
    \ threat actor/group \u2014 and the\nimpact of the incident on the municipality.\
    \ Check SuspectFile daily and follow\n@amvinfe on Twitter to stay abreast of news.\n\
    ### Related Posts:\n  * Za: NCape municipality battles devastating ransomware\
    \ attack\n  * Claiming to be the \"new generation,\" threat actors\u2026\n  *\
    \ Two more k-12 school districts allegedly hit by\u2026\n  * WA: Clover Park School\
    \ District investigating\u2026\n  * Ransomware attacks on medical entities continue:\
    \ a\u2026\n"
