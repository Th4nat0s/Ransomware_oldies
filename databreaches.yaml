  data: "\n# CA: Azusa Police reveal ransomware attack in March\n  * __May 30, 2021\n\
    \  *  __chum1ng0\n  * \nOn March 17, the DoppelPaymer threat actors added Azusa\
    \ Police Department in\nCalifornia to the leak site where they list ransomware\
    \ victims who have\nrefused to pay their ransom demands.\nOn April 22, the threat\
    \ actors increased the pressure on the department \u2014 or\nattempted to \u2014\
    \ by dumping some files as proof that they had accessed the\nsystem and exfiltrated\
    \ data. The files included police records concerning\ninvestigations and police\
    \ business such as patrol officers\u2019 reports. There was\nalso some financial\
    \ and payroll-related information. The folder names have\nbeen redacted by DataBreaches.net\
    \ in the image below:\n![](https://www.databreaches.net/wp-content/uploads/POC.png)Redacted\
    \ Image:\nDataBreaches.net\nThe threat actors do not indicate how much more data\
    \ they may have acquired.\n![](https://www.databreaches.net/wp-\ncontent/uploads/news_release_asuza-381x200.png)\n\
    On May 28, the police department issued a news release and notification about\n\
    the incident. According to their news release, on March 9, they discovered\nthat\
    \ certain aspects of its computer systems were inaccessible. They report:\n> Upon\
    \ discovery, Azusa Police immediately contacted its law enforcement\n> partners\
    \ and began working with third-party specialists to determine the\n> source of\
    \ the incident and extent of systems affected. As a result of the\n> Department\u2019\
    s quick response, all 911, emergency systems, and public safety\n> services remained\
    \ fully operational.\nOn April 27, 2021, they determined that the threat actors\
    \ had acquired some\nfiles and began to investigate to confirm what was accessed\
    \ and exfiltrated.\n> On May 20, 2021, the investigation determined the information\
    \ may have\n> included the following: Social Security numbers; driver\u2019s license\
    \ numbers;\n> California identification card numbers; passport numbers; military\n\
    > identification numbers; financial account information; medical information;\n\
    > health insurance information; and/or information or data collected through\n\
    > the use or operation of an automated license plate recognition system.\nYou\
    \ can read their full news release on their web site. They have also\nestablished\
    \ a dedicated assistance line to address any questions individuals\nmay have and\
    \ to provide credit monitoring services to potentially impacted\nindividuals.\
    \ The assistance line can be reached at 855-535-1860, Monday\nthrough Friday,\
    \ 6 a.m. to 6 p.m. Pacific Time.\n* * *\n_Editing by Dissent_\n### Related Posts:\n\
    \  * IA: Union Community School District publicly silent\u2026\n  * Negotiations\
    \ fail, threat actors dump more data from\u2026\n  * Presque Isle police data\
    \ leaked by threat actors -- somewhat\n  * CZ: Asbis hit by ransomware, working\
    \ to recover\n  * More details emerge on Hall County, Georgia\u2026\n"
