  data: "\n# MT: Glacier Medical Associates reports data security breach\n  * __June\
    \ 2, 2021\n  *  __Dissent\n  * \nDaily Inter Lake reports:\n> Glacier Medical\
    \ Associates announced Tuesday the medical practice detected\n> and stopped a\
    \ data security breach that occurred April 7.\n>\n> According to a press release,\
    \ Glacier Medical Associates immediately engaged\n> third-party forensic specialists\
    \ to assist with securing the network\n> environment and investigate the extent\
    \ of any unauthorized activity. The\n> investigation concluded May 10.\n>\n> \u201C\
    GMA has found no evidence that specific individuals\u2019 information has been\n\
    > misused,\u201D the release noted. \u201CHowever, due to the compromise of GMA\u2019\
    s\n> network, GMA has notified all potentially affected individuals of this\n\
    > incident.\u201D\nRead more on Daily Inter Lake. DataBreaches.net has not found\
    \ the press\nrelease online yet or on their web site, but notes that the news\
    \ site reports\nwhat seems like unfortunate advice on incident response:\n> Glacier\
    \ Medical Associates Practice Administrator Kelli Meuchel said the\n> medical\
    \ practice\u2019s legal counsel has advised the business not to divulge the\n\
    > number of patients potentially affected\nGMA will be divulging the number to\
    \ HHS and state regulators. This just makes\nthem look like they have something\
    \ to hide instead of being transparent. In\nthis blogger\u2019s opinion, entities\
    \ should really get ahead of the story by\ngetting the facts out when they can\
    \ control the presentation. When news sites\nhave to publish a second story or\
    \ update when the facts do come out, it just\nkeeps the entity in the news cycle\
    \ instead of being a 15-minute story.\n### Related Posts:\n  * Cleveland Medical\
    \ Associates tells patients of\u2026\n  * MT: Vandal gains access to medical files\n\
    \  * Colorado family practice notifies patients following\u2026\n  * Service provider\
    \ to fertility clinics discloses\u2026\n  * MT: Developing: Fraud reports in Butte\n"
