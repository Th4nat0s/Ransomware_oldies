  data: "\n# Having your ePHI dumped on the dark web by threat actors doesn\u2019\
    t necessarily\ngive you standing to sue\n  * __May 26, 2021\n  *  __Dissent\n\
    \  * \nIn May, 2020, Assured Imaging in Arizona experienced a ransomware attack\
    \ that\nthey revealed in August, 2020.The incident reportedly impacted 244,813\n\
    patients. The data dump by the Pysa threat actors contained a lot of ePHI that\n\
    appeared to be mostly mammography pre-screening histories or forms with data\n\
    types such as medical record number, names, addresses, date of birth,\nreferring\
    \ physician, health insurance carrier information,  \nand reason for scan with\
    \ relevant personal and family history.\nEarlier this month, Assured got some\
    \ good news when a federal judge in Tucson\ndismissed a potential class action\
    \ lawsuit against them, finding that the\nplaintiffs did not have standing to\
    \ sue as they had not alleged an injury in\nfact. As Reuters reported:\n> Hinderaker\
    \ agreed with Assured that the type of information potentially\n> accessed \u2013\
    \ names, addresses, medical history and other patient data \u2013 don\u2019t\n\
    > rise to the level needed to find a \u201Ccertainly impending injury.\u201D\n\
    Read more on Reuters.\n### Related Posts:\n  * 21 months after a ransomware attack,\
