  data: "\n# After going up, up, up, will ransom payments in healthcare and education\n\
    sectors start dropping?\n  * __May 26, 2021\n  *  __Dissent\n  * \nKey points:\n\
    \  * More than half of ransomware victims reportedly pay ransom, but there is\
    \ an absence of quality data and reporting that would enable better analyses.\n\
    \  * As payouts have increased, the number of customers electing to have cyberinsurance\
    \ coverage (the take-up rate) has increased, although SMBs lag behind mid- to\
    \ large-sized entities.\n  * As payouts have increased, insurance premiums have\
    \ gone up and are expected to rise again in 2021.\n  * Insurers are starting to\
    \ limit coverage for the healthcare and education sectors, two sectors that are\
    \ notoriously \u201Csoft targets.\u201D Other sectors, including the government\
    \ sector, may also experience reduced caps or coverage.\nIn recent months, threat\
    \ actors including REvil (Sodinokibi), Conti (Ryuk),\nand DarkSide all mention\
    \ \u2014 and even brag \u2014 how they research how much\ncyberinsurance their\
    \ victims have when they are calculating how much ransom to\ndemand. And we have\
    \ seen, in some negotiation chats that were made public,\nnegotiators actually\
    \ referring to specific amounts and letting their victims\nknow that they shouldn\u2019\
    t try to argue for less because the threat actors know\nthe insurance cap.\n\u201C\
    UNKN\u201D from REvil went even further. In a recent interview, they indicated\n\
    that insurers themselves were great targets from their perspective.\nThe comments,\
    \ taken together, suggested that maybe if victims didn\u2019t carry so\nmuch cyberinsurance,\
    \ the threat actors wouldn\u2019t demand so much. Could it be\nthat simple? I\
    \ put the question to DarkSide when I interviewed them, \u201CSomeone\nsuggested\
    \ that if companies didn\u2019t have cyberinsurance, ransomware threat\nactors\
    \ would lose interest and just go away. Do you think that\u2019s true?\u201D That\n\
    was the only question that DarkSide did not answer. Perhaps they didn\u2019t want\n\
    to encourage insurance companies to reduce coverage by admitting that entities\n\
    might be less desirable as targets if they had less coverage?\nLess than one month\
    \ later, global insurance company AXA announced that it\nwould no longer write\
    \ policies in France that include coverage for ransom\npayments. New policies\
    \ written would cover recovery from a ransomware\nincident, but not a payment\
    \ of ransom itself. Existing policies would not be\naffected.\nAt the same time\
    \ AXA was making its headline-making announcement, the\nGovernment Accountability\
    \ Office was getting ready to publish its own report:\n**CYBER INSURANCE: Insurers\
    \ and Policyholders Face**  \n**Challenges in an Evolving Market**\n**GAO-21-477**\n\
    Some of the major findings and points in the report include:\nThe proportion of\
    \ clients electing to sign up for cyberinsurance (the \u201Ctake-up\nrate\u201D\
    ) increased from 26% in 2016 to 47% in 2020. Rates for small and mid-size\nentities\
    \ lagged behind those of larger entities. The reason for that could\nreflect a\
    \ combination of factors: SMBs underestimating cyber risks, difficulty\nunderstanding\
    \ coverage, a belief that their current coverage is adequate, and\naffordability\
    \  \nconcerns.\nIn the government\u2019s desire to discourage victims from paying\
    \ ransom (which\npresumably encourages) more crime, the government does not seem\
    \ to have really\npublicized the fact that the majority of victims reportedly\
    \ do pay ransom (or\nat least that is what I am hearing from different sources).\
    \ But the reality is\nthat we do not have high-quality data on how many ransomware\
    \ attacks there\nare, and what percent of victims pay \u2014 and how much they\
    \ pay because most\nincidents go unreported. Without that information, insurers\
    \ are somewhat in\nthe dark in trying to understand trends and future costs, and\
    \ the customers\nare also in the dark about how much risk they face.\nThe industry\
    \ sectors with the highest take-up rates in  \n2016\u20132020 included education\
    \ and health care. Those sectors collect, store,\nand use significant amounts\
    \ of personally identifiable information or\nprotected health information. And\
    \ unfortunately, they do not seem to secure it\nwell, making them easy targets\
    \ \u2014 and if they have good insurance coverage \u2014\nlucrative targets. While\
    \ some threat actors have stated that they will not\nattack hospitals and certain\
    \ types of medical entities, other threat actors\nfeel no such ethical restraint\
    \ and continue to attack medical practices as\nwell as entities involved in researching\
    \ or producing vaccines.\nWith attacks and payouts increasing, it is not surprising\
    \ that the cose of\ninsurance increased. One survey found that more than half\
    \ of respondents\u2019\nclients experienced premium increases of 10-30% in late\
    \ 2020.\nHow much does insurance cost? Well, different carriers have different\
    \ rates\nand cover different things, but the GAO reported that brokers specializing\
    \ in\ncyber insurance for small  \nand mid-size entities reported that \u201C\
    average premiums for cyber policies\ncurrently range from about $1,400 to about\
    \ $3,000 per million of limit for\nsmall entities that have strong cyber controls\
    \ and are in low-risk industries.\nPremiums can be many times that amount depending\
    \ on entity and industry risk\nfactors.\u201D Expect those numbers to rise in\
    \ 2021 for mid-size and larger\nentities in high-risk sectors.\nBut one take-home\
    \ message from the GAO report is that coverage limits are\nalready being reduced\
    \ in the healthcare and education sectors due to the\nnumber of cyberattacks.\
    \ And ominously, perhaps, the report notes:\nThe extent to which cyber insurance\
    \ will continue to be generally available\nand affordable remains uncertain. Despite\
    \ the upward trend in take-up rates to\ndate, insurer appetite and capacity for\
    \ underwriting cyber risk has contracted\nmore recently, especially in certain\
    \ high-risk industry sectors such as health\ncare and education and for public-sector\
    \ entities, according to the Council of\nInsurance Agents and Brokers, Marsh McLennan,\
    \ and A.M. Best.\nWhile the government has not banned ransom payments, and such\
    \ a law would\ngenerate a lot of concerns and pushback, the insurance industry\
    \ may be the\nmost effective way to get entities not to make themselves more attractive\n\
    targets by carrying high amounts of coverage for ransom payments.\nAnd wouldn\u2019\
    t it be better to spend money on security before the fact instead\nof on premiums\
    \ for insurance coverage for clean-up from a breach?\nThere\u2019s a lot more\
    \ to the GAO report, which you can access here.\n### Related Posts:\n  * Council\
    \ data breaches increase by 'alarming' 1,600 per cent\n  * Attacks targeting healthcare\
    \ organizations spike\u2026\n  * FBI warns healthcare sector vulnerable to cyber\
    \ attacks\n  * America\u2019s Schools Have A Big Cybersecurity Problem\n  * As\
    \ 2010 draws to a close, data breach version\n"
