  data: "\n# Claiming to be the \u201Cnew generation,\u201D threat actors declare,\
    \ \u201CNo more\ndiscounts or long negotiations\u201D\n  * __May 31, 2021\n  *\
    \  __Dissent\n  * \nThis week saw the emergence of a new group calling themself\
    \ \u201CPay or Grief.\u201D Or\nmaybe they call themselves \u201CGrief\u201D or\
    \ \u201CGrief_List.\u201D I really am not sure\nbecause they haven\u2019t responded\
    \ to simple questions like \u201CWhat do we call you?\u201D\nIn any event, DataBreaches.net\
    \ noted two of their attacks and now SuspectFile\nwas able to get an actual statement\
    \ from the threat actors that may help us\npredict their behavior.\nFirst, SuspectFile\
    \ got them to state on the record that they will not target\nthe health care sector.\
    \ Their reasons, however, are not altruistic at all:\n> We know some players like\
    \ it, but there are a lot more interesting sectors\n> to make money. Some things\
    \ like plastic surgery or pharma sector have almost\n> nothing with health but\
    \ have lot of money \u2013 so they will come to our lists\n> too.\nSignificantly,\
    \ they informed SuspectFile:\n> Who are we? We are the new generation\u2026 No\
    \ more Discounts, time of long-term\n> negotiations with brainwashing and tons\
    \ of proofs is finished. The game is\n> over for companies who like long negotiations,\
    \ pay or grief come to you. We\n> have all leaked files\u2026 On our website What\
    \ about GDPR? Everyone just talks\n> about GDPR. Nobody obeys this law. Plenty\
    \ of hacked companies that leaked\n> files including id, confidential information,\
    \ scans etc wasn\u2019t sanctioned\n> for leak. We could stay inside the companies\
    \ for weeks. It is enough for\n> downloading confidential information, mails,\
    \ id and other We have analyzed\n> many ransomware groups and we are not like\
    \ they. Companies are spending a\n> lot of money hiring company-negotiatiors.\
    \ Where is the result? Nothing. They\n> spend money and time while the documents\
    \ are publishing. Who won? Company-\n> negotiatiors/Insurance companies. Now we\
    \ define the rules of the game, fuck\n> discounts, fuck negotiations, fuck time\
    \ wasting\u2026 Pay or Grief. This is our\n> statement\nThere\u2019s a lot to\
    \ unpack there. Read SuspectFile\u2019s commentary on their\ninteractions with\
    \ these threat actors. Marco also has a write-up on another\none of this group\u2019\
    s victims: Mobile County, Alabama. You can read that on\nSuspectFile, too.\n###\
    \ Related Posts:\n  * It: Municipality of Porto Sant'Elpidio publicly\u2026\n\
    \  * Milan, the pharmaceutical company Mipharm SPA victim\u2026\n  * Update on\
    \ Cuyahoga Metropolitan Housing Authority\u2026\n  * Acer Data Breach, Sodinokibi\
    \ ransomware group\u2026\n  * The Blackbaud ransomware breach -- impact on school\
    \ clients\n"
