    Bumi Negara, lit. ''State Oil and Natural Gas Mining Company'') is an Indonesian
    state-owned oil and natural gas corporation based in Jakarta. It was created in
    August 1968 by the merger of Pertamin (established 1961) and Permina (established
    1957). The firm is currently (2013) the second-largest crude oil producer in Indonesia
    behind the US-based Chevron Pacific Indonesia. In 2013 for the first time, Pertamina
    ranked no. 122 in the Fortune Global 500 list of companies with revenues totalling
    to $70.9 billion, it is also the sole Indonesian company to be featured in the
    list. According to 2020 Fortune list, Pertamina is the largest company in Indonesia.

