  data: "Ultrapar Participa\xE7\xF5es S.A.\nhttps://www.ultra.com.br\nUltra is a Brazilian\
    \ company operating in the sectors of fuel distribution, through Ipiranga and\
    \ Ultragaz; in the production of specialty chemicals, through Oxiteno; in the\
    \ storage of liquid bulk, through Ultracargo; and in pharmacies, through Extrafarma,\
