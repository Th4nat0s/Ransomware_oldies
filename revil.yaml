    ? !!python/tuple [victim, 'Allen, Dyer, Doppelt, & Gilchrist, P.A.']
    : null
  data: "## Allen, Dyer, Doppelt, & Gilchrist, P.A.\n**https://allendyer.com/**\n\
    For over 45 years, Allen, Dyer, Doppelt + Gilchrist has been a formidable\npresence\
    \ in Florida law, specializing in intellectual property and complex\nbusiness\
    \ litigation. Our depth of experience allows us to provide effective\nlegal services\
    \ to a range of clients from individual entrepreneurs to national\nand international\
    \ corporations.\nOur practice areas include patent, trademark and copyright prosecution,\n\
    licensing and litigation, as well as computer and internet law, and\nentertainment\
    \ law. We appear before the United States Patent and Trademark\nOffice, arbitration\
    \ panels and administrative bodies and state and federal\ncourts throughout the\
    \ country.\nMany of our attorneys are certified in intellectual property and as\
    \ mediators.\nThe firm includes attorneys and agents registered to practice before\
    \ the\nUnited States Patent and Trademark Office. We handle foreign applications\
    \ as\nwell.\nOur litigators try a wide array of intellectual property, franchise\
    \ and\ncommercial cases and have won significant victories at trial. ADD+G lawyers\n\
