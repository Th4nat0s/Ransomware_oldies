    Placon, headquartered in Madison, WI, designs and manufactures unique

    thermoformed and injection molded plastic packaging products that are built

    with the end-user in mind. Founded in 1966, Placon operates with the same

    Midwestern values and engineering spirit that the company was built on.

    Within the medical device, food and retail markets, Placon offers true custom-

    designed packaging and creative, off-the-shelf solutions with capabilities

    from design, prototyping, tool design and build, thermoforming, injection

    molding, pre-print, labeling and other decorating services.

    Known as one of the top 20 thermoformers in the US according to Plastics News,

    Placon provides inspired packaging designs that are attractive, protective,

    functional and intuitive. Sustainably-minded, the company built a recycling

    and extrusion facility that takes discarded PET (#1 resin ID code) bottles and

    thermoforms and transforms them into new packaging.

