  data: "Maze Team official press release. July 9th 2020\nThe whole world is in pandemic\
    \ and deep economy crisis. We are also in the same reality with the whole world.\
    \ In this situation we have to announce news about the further communications\
    \ with our current and new clients and data processing of their info.\n1. It would\
    \ take now 3 days from the moment of attack till the publishing of the client\u2019\
    s information at our website. If you have failed to start communication in 3 days\
    \ you can blame only yourself for you reputation damage and financial lost.\n\
    2. Negotiations means the dialog and finding the best solution for the both parties.\
