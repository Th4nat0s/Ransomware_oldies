  data: "Maze Team official press release. June 22, 2020\nMaze Team is working hard\
    \ on collecting and analyzing the information about our clients and their work.\
    \ We also analyzing the post attack state of our clients. How fast they were able\
    \ to recover after the successful negotiations or without cooperation at all.\n\
    Today we would like to tell some words about the cost of non-cooperation and about\
    \ our clients who were trying to recover all the information themselves. Looking\
    \ ahead all those attempts were more close to suicide than to recovery.\nSo the\
    \ company was attacked and the files were blocked and encrypted. What are the\
    \ worst mistakes the company can made?\nMaze Locker can\u2019t be decrypted without\
    \ the help of Maze Team. A few companies we are not going to name were trying\
    \ to decrypt the files with the help of side organizations. Those organizations\
    \ are well known security companies. That happened at the end of 2019 and they\
    \ are still waiting for a solution. As we know, compared to the first offer of\
    \ Maze Team, those companies already paid two and a half times more money. One\
    \ of those companies already spend four times more trying to decrypt the files\
    \ themselves. And we guarantee that it would take them years to wait until decryption.\n\
    But encrypting files is not the main risk. If the company have chosen to make\
    \ a long pause in its operations this is the company\u2019s right. But sometimes\
    \ companies can\u2019t understand the risk of information leak, especially the\
    \ private information. We are specializing in client\u2019s private information,\
    \ financial information, databases, credit card data, NDA documents and all the\
    \ company\u2019s researches.\nUsually that kind of information leaks will lead\
    \ for multimillion losses, fines and lawsuits. And don\u2019t forget about the\
    \ lost profit and falling of the stock price.\nAs we know from the reports of\
    \ our clients the average recovery costs are about $60M. We have never asked for\
    \ amounts even close to those.\nAccording to our statistics the loss from lawsuits\
    \ and fines varies from $18M to $47M. As we know from one of our clients, in one\
    \ week he loosed $12M while his files were in open access. For large companies\
    \ the average lost if about $50M-60M after the publication of private data. A\
    \ few very large companies have lost from $250M to $350M.\nWhile hiring the negotiators\
    \ from the side, especially the those who work on government, and listening to\
    \ what they tell you, try to think are they really interested in solving your\
    \ problems or they are just thinking about their own profit and ambitions of the\
    \ government agency they belong to. They can\u2019t minimize your loss or eliminate\
    \ the data breach. You\u2019ll pay from your own pocket. But you will be able\
    \ to find yourself in a statistics of companies who were proudly refuse to pay\
    \ to minimize the loss of attack.\nThe most vivid examples of such companies:\n\
    1. ST Engineering (http://www.stengg.com). The negotiator they have hired have\
    \ lied to us and to ST Engineering. He asked for a few unimportant files that\
    \ were, as he thought, downloaded from the company\u2019s network. After it the\
    \ company declined the further negotiation. As a result, for now about 5% of the\
    \ information is already in public access. And this is just the private messages.\
    \ Soon it will be the time for weapon contacts, contracts for alteration of airplanes\
    \ for first persons, contracts with dictatorship countries, contacts for cybersecurity\
    \ systems for government structures. We just can\u2019t understand what cybersecurity\
    \ they are talking about as they have an Australia size security hole in their\
    \ security perimeter. As for now, the company have lost a tenths of millions dollars.\
    \ After the complete publication of all downloaded info everything should be worse.\n\
    2. MaxLinear Inc. (http://www.maxlinear.com). Again the negotiator from the side\
    \ and greedy management from the other side. The company have lost the source\
    \ code of all its IT products and everything they have developed for Intel Corporation,\
    \ also contracts and financial reports. The company have find a way to leak to\
    \ hackers all its software products and to loose a contract for $400M with Intel.\
    \ The main profit was the ability to state that they are not negotiating with\
    \ hackers. They also endangers the large part of IT industry for next 5-7 years\
    \ and leaked the impornat information of the world\u2019s largest CPU maker.\n\
    3. Conduent, Inc. (http://www.conduent.com) and its subsidiaries just leak to\
    \ public access the information about its clients while working in the niche of\
    \ high financial responsibility. Information is not yet published due to lack\
    \ of time.\n4. M.J. BRUNNER, Inc. (http://www.brunnerworks.com, http://www.seic.com).\
    \ This company was attacked by one of the Maze Team members. This case is remarkable\
    \ as after the company declined the negotiations, another company Seic was successfully\
    \ attacked using the information gotten from Brunner Inc. Downloaded information\
    \ includes databases and all reports. The information is not yet ready for public\
    \ access bit it will be ready soon as the negotiators were asking for non existing\
    \ files following by silence. This looks like the basic scheme of work with side\
    \ negotiators with a huge financial loss as a result.\nWe are not going to publish\
    \ the full list of all those businesses. All the information is available at our\
    \ news website. Just try to understand that nobody cares about your business except\
    \ of yourself. It doesn\u2019t matter what the hired negotiators will promise\
    \ you, they just can\u2019t do anything to prevent publishing of leaked information\
    \ and the consequences of it. If you have extra $50M-$100M you can try to recover\
    \ the information by yourself. Or you can just contact us. We are ready for negotiations.\
    \ Be wise.\nAfter all successful negotiations our clients will also receive the\
    \ compehensive report of all it\u2019s securuty problems and attack log. This\
    \ will help to fix the security.\nTo contact us use the feedback form of our news\
    \ website.\nAnd some future presentation. Soon you\u2019ll be able to know how\
    \ the LG company have lost the source code of its products for one very big telecommunications\
    \ company, working worldwide.\nGo to home"
