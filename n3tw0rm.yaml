  data: "[Introduction to N3tw0rm]\n[\nWhat is Ransomware?\nRansomware is a type of\
    \ malware from cryptovirology that threatens to publish the victim's data or perpetually\
    \ block access to it unless a ransom is paid. While some simple ransomware may\
    \ lock the system so that it is not difficult for a knowledgeable person to reverse,\
    \ more advanced malware uses a technique called cryptoviral extortion. It encrypts\
    \ the victim's files, making them inaccessible, and demands a ransom payment to\
    \ decrypt them. In a properly implemented cryptoviral extortion attack, recovering\
    \ the files without the decryption key is an intractable problem \u2013 and difficult\
    \ to trace digital currencies such as paysafecard or Bitcoin and other cryptocurrencies\
    \ are used for the ransoms, making tracing and prosecuting the perpetrators difficult.\n\
    Read more\u2026\nWhat about N3tw0rm?\nN3tw0rm provides enterprise-level of ransomware\
